<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <title>Ramallah Waste Containers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      direction: rtl;
    }

    #map {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* 🔍 صندوق البحث */
    #search-box {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.95);
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      width: 240px;
      z-index: 1000;
    }

    #search-box input {
      width: 100%;
      padding: 6px;
      border: 1px solid #aaa;
      border-radius: 5px;
    }

    #search-box button {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
      background: #444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    #search-box button:hover {
      background: #000;
    }

    /* 📦 صندوق تعبئة الشكاوي */
    #complaint-box {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.95);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      width: 260px;
      z-index: 1000;
    }

    #complaint-box h3 {
      margin-top: 0;
      font-size: 16px;
      text-align: center;
    }

    #complaint-box label {
      font-size: 13px;
      font-weight: bold;
    }

    #complaint-box input,
    #complaint-box select {
      width: 100%;
      margin-bottom: 8px;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 13px;
    }

    #complaint-box button {
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 5px;
    }

    #complaint-box button:hover {
      background: #0056b3;
    }

    #view-btn {
      background: #28a745;
    }

    #view-btn:hover {
      background: #1e7e34;
    }

    #coords {
      font-size: 12px;
      color: #333;
      margin-bottom: 6px;
    }

    /* زر الطوارئ */
    #emergency-btn {
      background: #dc3545;
    }
    #emergency-btn:hover { background: #b02a37; }

    /* 📃 صندوق عرض الشكاوي */
    #complaints-list-box {
      position: absolute;
      top: 350px; /* تم رفعه لتحت صندوق تعبئة الشكاوي */
      right: 20px;
      width: 260px;
      max-height: 300px;
      overflow-y: auto;
      background: rgba(255,255,255,0.95);
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      z-index: 1000;
      font-size: 13px;
    }

    #complaints-list-box h4 {
      margin-top: 0;
      text-align: center;
    }

    .complaint-item {
      border-bottom: 1px solid #ccc;
      padding: 4px 0;
    }

    /* مودال تأكيد */
    .em-modal {
      position: fixed; top:0; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center;
      background: rgba(0,0,0,0.5); z-index: 2000; display:none;
    }
    .em-modal .card{
      background:white; padding:18px; border-radius:10px; width:320px; text-align:center; direction:rtl;
    }
    .em-modal button{ width:48%; margin:6px 4px; }
    #em-log { margin-top:8px; font-size:12px; color:#555; }

  </style>
</head>
<body>
  <div id="map"></div>

  <!-- 🔍 صندوق البحث -->
  <div id="search-box">
    <input type="text" id="search-input" placeholder="ابحث عن منطقة أو حاوية..." />
    <button id="search-btn">بحث</button>
  </div>

  <!-- 📦 صندوق تعبئة الشكاوي -->
  <div id="complaint-box">
    <h3>صندوق الشكاوي</h3>
    <label>الاسم:</label>
    <input type="text" id="name" placeholder="اكتب اسمك">
    <label>رقم الهاتف:</label>
    <input type="text" id="phone" placeholder="05XXXXXXXX">
    <label>نوع الشكوى:</label>
    <select id="type">
      <option value="نظافة">نظافة</option>
      <option value="حاوية ممتلئة">حاوية ممتلئة</option>
      <option value="موقع خاطئ للحاوية">موقع خاطئ للحاوية</option>
      <option value="أخرى">أخرى</option>
    </select>
    <div id="coords">موقع الشكوى: لم يُحدد بعد</div>
    <button id="submit">إرسال الشكوى</button>
    <button id="view-btn">📥 عرض الشكاوى</button>
    <button id="emergency-btn">📞 نداء طوارئ: جمع نفايات</button>

    <div id="em-log">سجل الطوارئ: لا توجد نداءات حالياً.</div>
  </div>

  <!-- 📃 صندوق عرض الشكاوي -->
  <div id="complaints-list-box">
    <h4>الشكاوى المسجلة</h4>
    <div id="complaints-list"></div>
  </div>

  <!-- مودال تأكيد الطوارئ -->
  <div id="em-modal" class="em-modal">
    <div class="card">
      <h4>تأكيد نداء الطوارئ</h4>
      <p id="em-modal-text">هل تريد إرسال نداء طوارئ لرفع النفايات عند الموقع المحدد؟</p>
      <div style="display:flex; justify-content:space-between;">
        <button id="em-confirm" style="background:#dc3545; color:white;">نعم أرسل</button>
        <button id="em-cancel" style="background:#6c757d; color:white;">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>
    const map = L.map("map", { center:[31.9045,35.2045], zoom:17.5 });
    L.control.scale({ position:"bottomleft", metric:true }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution:'&copy; OpenStreetMap & CARTO', subdomains:'abcd', maxZoom:20
    }).addTo(map);

    let zonesData = [];
    let containersData = [];
    let complaints = [];
    let complaintsLayer = L.layerGroup().addTo(map);
    let complaintMarker = null;
    let complaintCoords = null;

    // تحميل الحاويات
    $.getJSON("wasteContainer.json", function(WC){
      L.geoJson(WC,{
        pointToLayer:function(feature, latlng){
          const name = feature.properties.Name || "حاوية بدون اسم";
          const marker = L.circleMarker(latlng,{radius:6, fillColor:"orange", color:"orange", weight:1, opacity:1, fillOpacity:0.9}).addTo(map);
          L.circle(latlng,{radius:10,color:"green", fillColor:"green", fillOpacity:0.15, weight:1}).addTo(map);
          containersData = WC.features;
          return marker;
        }
      }).addTo(map);
    });

    // تحميل المناطق
    $.getJSON("RamallahZones.json", function(RZ){
      L.geoJson(RZ,{
        style:{fillColor:"yellow", fillOpacity:0.3, color:"yellow", weight:1, opacity:0.7},
        onEachFeature:function(feature,layer){
          layer.on('click',function(){ alert("Zone: "+feature.properties.NAME_ENGLI+"\nMAIL_CODE: "+feature.properties.MAIL_CODE); });
        }
      }).addTo(map);
      zonesData = RZ.features;
    });

    // تحديد موقع الشكوى على الخريطة
    map.on('click', function(e){
      complaintCoords = e.latlng;
      if(complaintMarker) map.removeLayer(complaintMarker);
      complaintMarker = L.marker(complaintCoords).addTo(map);
      document.getElementById("coords").innerText = `موقع الشكوى: ${complaintCoords.lat.toFixed(5)}, ${complaintCoords.lng.toFixed(5)}`;
    });

    // إرسال الشكوى وتحديث قائمة الشكاوى
    function updateComplaintsList(){
      const listDiv = document.getElementById("complaints-list");
      listDiv.innerHTML = "";
      complaints.forEach((c,i)=>{
        const div = document.createElement("div");
        div.className = "complaint-item";
        div.innerHTML = `<b>${i+1}.</b> ${c.name} - ${c.type} - (${c.location.lat.toFixed(5)},${c.location.lng.toFixed(5)})`;
        listDiv.appendChild(div);
      });
    }

    document.getElementById("submit").addEventListener("click", function(){
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const type = document.getElementById("type").value;

      if(!name || !phone || !complaintCoords){ alert("املأ كل الحقول وحدد موقع الشكوى على الخريطة."); return; }

      complaints.push({name, phone, type, location:complaintCoords, time: new Date().toISOString()});
      updateComplaintsList();

      alert("✅ تم إرسال الشكوى بنجاح!");
      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("type").value="نظافة";
      document.getElementById("coords").innerText="موقع الشكوى: لم يُحدد بعد";

      if(complaintMarker){ map.removeLayer(complaintMarker); complaintMarker=null; complaintCoords=null; }
    });

    // عرض الشكاوى على الخريطة
    document.getElementById("view-btn").addEventListener("click", function(){
      complaintsLayer.clearLayers();
      complaints.forEach(c=>{
        L.circleMarker(c.location,{radius:6, fillColor:"red", color:"white", weight:1, opacity:1, fillOpacity:0.9})
          .bindPopup(`<b>الاسم:</b> ${c.name}<br><b>النوع:</b> ${c.type}`).addTo(complaintsLayer);
      });
      alert(`تم عرض ${complaints.length} شكوى على الخريطة ✅`);
    });

    // البحث
    document.getElementById("search-btn").addEventListener("click", function(){
      const query=document.getElementById("search-input").value.trim().toLowerCase();
      if(!query){ alert("اكتب اسم المنطقة أو الحاوية للبحث."); return; }

      const foundZone = zonesData.find(z=> z.properties.NAME_ENGLI && z.properties.NAME_ENGLI.toLowerCase().includes(query));
      if(foundZone){
        const bounds=L.geoJson(foundZone).getBounds();
        map.fitBounds(bounds);
        L.popup().setLatLng(bounds.getCenter()).setContent(`<b>منطقة:</b> ${foundZone.properties.NAME_ENGLI}`).openOn(map);
        return;
      }

      const foundContainer = containersData.find(c=>c.properties.Name && c.properties.Name.toLowerCase().includes(query));
      if(foundContainer){
        const latlng=[foundContainer.geometry.coordinates[1],foundContainer.geometry.coordinates[0]];
        map.setView(latlng,19);
        L.popup().setLatLng(latlng).setContent(`<b>حاوية:</b> ${foundContainer.properties.Name}`).openOn(map);
        return;
      }

      alert("❌ لم يتم العثور على أي منطقة أو حاوية بهذا الاسم.");
    });

    // ================== إضافة خاصية نداء الطوارئ ==================
    // ضع أرقام الطوارئ الحقيقية هنا (يمكن تعديلها لاحقاً)
    const EMERGENCY_CONTACTS = [
      { name: 'قسم النظافة - رام الله', phone: '+970599123456' },
      { name: 'مشغل الطوارئ', phone: '+970599654321' }
    ];

    // سجل نداءات الطوارئ في localStorage (للاختبار)
    function loadEmLog(){
      try{ const raw = localStorage.getItem('rw_emlog'); return raw? JSON.parse(raw): []; }catch(e){ return []; }
    }
    function saveEmLog(log){ try{ localStorage.setItem('rw_emlog', JSON.stringify(log)); }catch(e){} }

    function appendEmLog(entry){
      const log = loadEmLog();
      log.unshift(entry);
      saveEmLog(log);
      renderEmLog();
    }

    function renderEmLog(){
      const log = loadEmLog();
      const el = document.getElementById('em-log');
      if(log.length === 0) { el.innerText = 'سجل الطوارئ: لا توجد نداءات حالياً.'; return; }
      el.innerHTML = '<b>سجل الطوارئ (أحدث 5):</b><br>' + log.slice(0,5).map(it=>`• ${new Date(it.time).toLocaleString()} — ${it.contact || 'مستخدم'} (${it.lat.toFixed(5)}, ${it.lng.toFixed(5)})`).join('<br>');
    }

    renderEmLog();

    // عناصر الواجهة للمودال
    const emBtn = document.getElementById('emergency-btn');
    const emModal = document.getElementById('em-modal');
    const emConfirm = document.getElementById('em-confirm');
    const emCancel = document.getElementById('em-cancel');

    emBtn.addEventListener('click', ()=>{
      if(!complaintCoords){ alert('حدّد الموقع على الخريطة أولاً (انقر على الخريطة)'); return; }
      document.getElementById('em-modal-text').innerText = `هل تريد إرسال نداء طوارئ لرفع النفايات عند الموقع: ${complaintCoords.lat.toFixed(5)}, ${complaintCoords.lng.toFixed(5)}؟`;
      emModal.style.display = 'flex';
    });
    emCancel.addEventListener('click', ()=>{ emModal.style.display='none'; });

    emConfirm.addEventListener('click', async ()=>{
      emModal.style.display='none';
      const payload = {
        lat: complaintCoords.lat,
        lng: complaintCoords.lng,
        time: new Date().toISOString(),
        note: 'نداء طوارئ عبر الواجهة',
        reporter: { name: document.getElementById('name').value || 'مواطن', phone: document.getElementById('phone').value || '' }
      };

      // سجل محلي
      appendEmLog({ ...payload, contact: 'محلي' });

      // محاولة إرسال إلى السيرفر (إن وجد) — استبدل المسار بعنوان API الحقيقي لديك
      try{
        fetch('/api/emergency-notify', {
          method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
        }).then(r=>{
          if(r.ok){
            appendEmLog({ ...payload, contact: 'server' });
          }
        }).catch(e=>{
          // إن فشل، نترك السجل المحلي كاحتياط
        });
      }catch(e){}

      // عرض أرقام الاتصال وروابط سريعة للاتصال أو واتساب
      const detailsLines = EMERGENCY_CONTACTS.map(c=> `${c.name}: ${c.phone}`).join('\n');
      alert('تم إرسال نداء الطوارئ محلياً.\nيمكنك الآن الاتصال بالأرقام التالية أو إرسال رسالة واتساب:\n\n' + detailsLines);

      // تفعيل Notification إن سمح المستخدم
      try{ if('Notification' in window && Notification.permission !== 'granted') await Notification.requestPermission(); }catch(e){}
      if('Notification' in window && Notification.permission === 'granted'){
        new Notification('نداء طوارئ - جمع نفايات', { body: `موقع: ${payload.lat.toFixed(5)}, ${payload.lng.toFixed(5)}` });
      }

      // تشغيل صوت تنبيه بسيط (يمكن استبداله بملف حقيقي)
      try{
        const audio = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=');
        audio.play().catch(()=>{});
      }catch(e){}
      
      // بعد النداء، نعرض نافذة صغيرة تحتوي على روابط الاتصال (ضمّنها إن أردت في واجهة أجمل)
      // مثال: مباشرة الانتقال إلى تطبيق الاتصال على الجوال (اختياري):
      // window.location.href = 'tel:+970599123456';
    });

    // --- اختياري: render أزرار اتصالات سريعة (لو تريد مكان ثابت) ---
    // لو أردت إضافة زر صغير يعرض قائمة بالأرقام في واجهة منبثقة بدل alert، أخبرني وأضيفها.

  </script>
</body>
</html>
