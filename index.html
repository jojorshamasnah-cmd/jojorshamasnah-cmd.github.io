<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Ramallah Waste Containers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      height: 100%;
      width: 100%;
    }

    #map {
      position: absolute;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <script>
    // إعداد الخريطة
    const map = L.map("map", {
      center: [31.9045, 35.2045],
      zoom: 17.5
    });

    // مقياس الخريطة
    L.control.scale({ position: "bottomleft", metric: true }).addTo(map);

    // طبقة الأساس
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap & CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    // تحميل بيانات الحاويات
    $.getJSON("wasteContainer.json", function (WC) {
      L.geoJson(WC, {
        pointToLayer: function (feature, latlng) {
          // إنشاء marker للحاوية
          const marker = L.circleMarker(latlng, {
            radius: 6,
            fillColor: "orange",
            color: "orange",
            weight: 1,
            opacity: 1,
            fillOpacity: 0.9
          });

          // اسم الحاوية من الخصائص
          const name = feature.properties.Name || "حاوية بدون اسم";

          // عند الضغط على الحاوية تظهر نافذة باسمها
          marker.bindPopup(`<b>اسم الحاوية:</b> ${name}`);

          // إضافة marker إلى الخريطة
          marker.addTo(map);

          // إضافة buffer حولها باللون الأخضر 💚
          L.circle(latlng, {
            radius: 10, // متر
            color: "green",
            fillColor: "green",
            fillOpacity: 0.15,
            weight: 1
          }).addTo(map);

          return marker;
        }
      }).addTo(map);
    });

    // تحميل بيانات مناطق رام الله
    $.getJSON("RamallahZones.json", function (RZ) {
      L.geoJson(RZ, {
        style: {
          fillColor: "yellow",
          fillOpacity: 0.3,
          color: "yellow",
          weight: 1,
          opacity: 0.7
        },
        onEachFeature: function (feature, layer) {
          layer.on('click', function () {
            alert("Zone: " + feature.properties.NAME_ENGLI + "\nMAIL_CODE: " + feature.properties.MAIL_CODE);
          });
        }
      }).addTo(map);
    });
  </script>
</body>

</html>
