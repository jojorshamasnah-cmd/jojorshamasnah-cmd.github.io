<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Ramallah Boundary Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ================================
    // Initialize map focused on Ramallah
    // ================================
    var map = L.map('map');
    var ramallahBounds = L.latLngBounds([[31.7, 35.0], [32.05, 35.35]]);
    map.fitBounds(ramallahBounds);
    map.setMaxBounds(ramallahBounds);

    // ✅ إضافة Scale Control
    L.control.scale({
        position: 'bottomleft',
        metric: true,
        imperial: false
    }).addTo(map);

    // ================================
    // Load Ramallah Boundary
    // ================================
    $.getJSON("Ramallah.json", function(data){
      L.geoJson(data, {
        style: {
          color: "yellow",
          weight: 2,
          fillColor: "yellow",
          fillOpacity: 0.2
        },
        onEachFeature: function(feature, layer){
          layer.bindPopup("Zone: " + (feature.properties.NAME || "N/A"));
          layer.bindTooltip(feature.properties.NAME || "N/A");
        }
      }).addTo(map);
    });
  </script>
</body>
</html>
