<!DOCTYPE html>
<html lang="ar">

<head>
  <meta charset="utf-8" />
  <title>Ramallah Waste Containers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      direction: rtl;
    }

    #map {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* 🔍 صندوق البحث */
    #search-box {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.95);
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
      width: 240px;
      z-index: 1000;
    }

    #search-box input {
      width: 100%;
      padding: 6px;
      border: 1px solid #aaa;
      border-radius: 5px;
    }

    #search-box button {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
      background: #444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    #search-box button:hover {
      background: #000;
    }

    /* 📦 صندوق الشكاوي */
    #complaint-box {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.95);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
      width: 260px;
      z-index: 1000;
    }

    #complaint-box h3 {
      margin-top: 0;
      font-size: 16px;
      text-align: center;
    }

    #complaint-box label {
      font-size: 13px;
      font-weight: bold;
    }

    #complaint-box input,
    #complaint-box select {
      width: 100%;
      margin-bottom: 8px;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 13px;
    }

    #complaint-box button {
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 5px;
    }

    #complaint-box button:hover {
      background: #0056b3;
    }

    #view-btn {
      background: #28a745;
    }

    #view-btn:hover {
      background: #1e7e34;
    }

    #coords {
      font-size: 12px;
      color: #333;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- 🔍 صندوق البحث -->
  <div id="search-box">
    <input type="text" id="search-input" placeholder="ابحث عن منطقة أو حاوية..." />
    <button id="search-btn">بحث</button>
  </div>

  <!-- 📦 صندوق الشكاوي -->
  <div id="complaint-box">
    <h3>صندوق الشكاوي</h3>
    <label>الاسم:</label>
    <input type="text" id="name" placeholder="اكتب اسمك">

    <label>رقم الهاتف:</label>
    <input type="text" id="phone" placeholder="05XXXXXXXX">

    <label>نوع الشكوى:</label>
    <select id="type">
      <option value="نظافة">نظافة</option>
      <option value="حاوية ممتلئة">حاوية ممتلئة</option>
      <option value="موقع خاطئ للحاوية">موقع خاطئ للحاوية</option>
      <option value="أخرى">أخرى</option>
    </select>

    <div id="coords">موقع الشكوى: لم يُحدد بعد</div>

    <button id="submit">إرسال الشكوى</button>
    <button id="view-btn">📥 عرض الشكاوى</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <script>
    const map = L.map("map", {
      center: [31.9045, 35.2045],
      zoom: 17.5
    });

    L.control.scale({ position: "bottomleft", metric: true }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap & CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    let zonesData = [];
    let containersData = [];

    // تحميل الحاويات
$.getJSON("wasteContainer.json", function (WC) {
  L.geoJson(WC, {
    pointToLayer: function (feature, latlng) {
      const material = feature.properties.Material || feature.properties.Name || "غير معروف";

      // إنشاء marker للحاوية
      const marker = L.circleMarker(latlng, {
        radius: 6,
        fillColor: "orange",
        color: "orange",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.9
      }).addTo(map);

      // عند الضغط على الحاوية يظهر من شو مصنوعة
      marker.on("click", function () {
        marker.bindPopup(`<b>من شو مصنوعة؟</b> ${material}`).openPopup();
      });

      // buffer أخضر حول الحاوية
      L.circle(latlng, {
        radius: 10,
        color: "green",
        fillColor: "green",
        fillOpacity: 0.15,
        weight: 1
      }).addTo(map);

      return marker;
    }
  }).addTo(map);

  // حفظ بيانات الحاويات للبحث
  containersData = WC.features;
});

    // تحميل مناطق رام الله
    $.getJSON("RamallahZones.json", function (RZ) {
      L.geoJson(RZ, {
        style: {
          fillColor: "yellow",
          fillOpacity: 0.3,
          color: "yellow",
          weight: 1,
          opacity: 0.7
        },
        onEachFeature: function (feature, layer) {
          layer.on('click', function () {
            alert("Zone: " + feature.properties.NAME_ENGLI + "\nMAIL_CODE: " + feature.properties.MAIL_CODE);
          });
        }
      }).addTo(map);
      zonesData = RZ.features;
    });

    // 📍 الشكاوي
    let complaintMarker = null;
    let complaintCoords = null;
    let complaints = [];
    let complaintsLayer = L.layerGroup().addTo(map);

    map.on('click', function (e) {
      complaintCoords = e.latlng;
      if (complaintMarker) map.removeLayer(complaintMarker);
      complaintMarker = L.marker(complaintCoords).addTo(map);
      document.getElementById("coords").innerText =
        `موقع الشكوى: ${complaintCoords.lat.toFixed(5)}, ${complaintCoords.lng.toFixed(5)}`;
    });

    document.getElementById("submit").addEventListener("click", function () {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const type = document.getElementById("type").value;

      if (!name || !phone || !complaintCoords) {
        alert("املأ كل الحقول وحدد موقع الشكوى على الخريطة.");
        return;
      }

      complaints.push({ name, phone, type, location: complaintCoords });
      alert("✅ تم إرسال الشكوى بنجاح!");
      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("type").value = "نظافة";
      document.getElementById("coords").innerText = "موقع الشكوى: لم يُحدد بعد";

      if (complaintMarker) {
        map.removeLayer(complaintMarker);
        complaintMarker = null;
        complaintCoords = null;
      }
    });

    document.getElementById("view-btn").addEventListener("click", function () {
      complaintsLayer.clearLayers();
      if (complaints.length === 0) {
        alert("لا توجد شكاوى بعد.");
        return;
      }
      complaints.forEach(c => {
        L.circleMarker(c.location, {
          radius: 6,
          fillColor: "red",
          color: "white",
          weight: 1,
          opacity: 1,
          fillOpacity: 0.9
        }).bindPopup(`<b>الاسم:</b> ${c.name}<br><b>النوع:</b> ${c.type}`).addTo(complaintsLayer);
      });
      alert(`تم عرض ${complaints.length} شكوى على الخريطة ✅`);
    });

    // 🔍 البحث
    document.getElementById("search-btn").addEventListener("click", function () {
      const query = document.getElementById("search-input").value.trim().toLowerCase();
      if (!query) {
        alert("اكتب اسم المنطقة أو الحاوية للبحث.");
        return;
      }

      const foundZone = zonesData.find(z => z.properties.NAME_ENGLI && z.properties.NAME_ENGLI.toLowerCase().includes(query));
      if (foundZone) {
        const bounds = L.geoJson(foundZone).getBounds();
        map.fitBounds(bounds);
        L.popup()
          .setLatLng(bounds.getCenter())
          .setContent(`<b>منطقة:</b> ${foundZone.properties.NAME_ENGLI}`)
          .openOn(map);
        return;
      }

      const foundContainer = containersData.find(c => c.properties.Name && c.properties.Name.toLowerCase().includes(query));
      if (foundContainer) {
        const latlng = [foundContainer.geometry.coordinates[1], foundContainer.geometry.coordinates[0]];
        map.setView(latlng, 19);
        L.popup()
          .setLatLng(latlng)
          .setContent(`<b>حاوية:</b> ${foundContainer.properties.Name}`)
          .openOn(map);
        return;
      }

      alert("❌ لم يتم العثور على أي منطقة أو حاوية بهذا الاسم.");
    });
  </script>
</body>
</html>
