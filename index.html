<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Ramallah Map with Roads</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Leaflet Search CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-search@2.9.9/dist/leaflet-search.min.css"/>

  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Search JS -->
  <script src="https://unpkg.com/leaflet-control-search@2.9.9/dist/leaflet-search.min.js"></script>

  <script>
    // ================================
    // Initialize map focused on Ramallah
    // ================================
    var map = L.map('map');
    var ramallahBounds = L.latLngBounds([[31.7, 35.0], [32.05, 35.35]]);
    map.fitBounds(ramallahBounds);
    map.setMaxBounds(ramallahBounds);

    // ✅ Add Scale Control
    L.control.scale({
        position: 'bottomleft',
        metric: true,
        imperial: false
    }).addTo(map);

    // ================================
    // Layer Groups
    // ================================
    var layersControl = {};
    var overlays = {};

    // ===== Ramallah Boundary Layer =====
    var ramallahLayer = L.layerGroup();
    $.getJSON("Ramallah.json", function(data){
      var geo = L.geoJson(data, {
        style: {color: "yellow", weight: 2, fillOpacity: 0.2},
        onEachFeature: function(feature, layer){
          layer.bindPopup(feature.properties.NAME || "N/A");
        }
      });
      geo.addTo(ramallahLayer);
      ramallahLayer.addTo(map);

      // ===== Search Control =====
      var searchControl = new L.Control.Search({
        layer: geo,
        propertyName: 'NAME',
        marker: false,
        moveToLocation: function(latlng, title, map) {
          map.setView(latlng, 12);
        }
      });
      searchControl.addTo(map);
    });
    overlays["Ramallah Boundary"] = ramallahLayer;

    // ===== Roads Layer =====
    var roadsLayer = L.layerGroup();
    $.getJSON("Roads.json", function(data){
      var geo = L.geoJson(data, {
        style: {color: "blue", weight: 2},
        onEachFeature: function(feature, layer){
          if(feature.properties.NAME){
            layer.bindPopup("Road: " + feature.properties.NAME);
          }
        }
      });
      geo.addTo(roadsLayer);
      roadsLayer.addTo(map);
    });
    overlays["Roads"] = roadsLayer;

    // ===== Layer Control =====
    L.control.layers(null, overlays, {collapsed: false}).addTo(map);
  </script>
</body>
</html>
